[pytest]
pythonpath = src
testpaths = tests
# -n auto: parallel, one worker per CPU (adapts to the box — 2 on CI runners).
# worksteal rebalances uneven test durations (the real-socket/threaded tests).
# Debugging escape hatch: `pytest -n 0` re-enables serial execution + pdb.
addopts = -q -n auto --dist worksteal
