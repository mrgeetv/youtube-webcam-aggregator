default_install_hook_types:
  - commit-msg
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-yaml
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-submodules
      - id: mixed-line-ending
      - id: name-tests-test
      - id: no-commit-to-branch
      - id: requirements-txt-fixer
      - id: trailing-whitespace

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          [
            --strict,
            --force-scope,
            --scopes,
            "docker,api,playlist,scraper,config,deps,ci,docs",
          ]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        # --extend-ignore (not --ignore) keeps flake8's black-compatible defaults
        # (E704, W503, …) and just adds E501/E203 on top — per black's guidance.
        args: ["--extend-ignore=E501,E203"]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: local
    hooks:
      - id: check-python-version
        name: Check Python version consistency
        entry: scripts/check-python-version.sh
        language: system
        files: '^(\.python-version|Dockerfile|docker-compose\.yml|pyrightconfig\.json)$'
        pass_filenames: false

      - id: pytest
        name: pytest (with coverage)
        entry: pytest
        language: system
        pass_filenames: false
        # Only run when code/tests/deps change (skip doc-only commits).
        files: '^(src/|tests/|pytest\.ini|requirements.*\.txt)'
        # Coverage floor lives here (not in pytest.ini addopts) so ad-hoc/partial
        # runs aren't tripped; floor sits a few points below the achieved ~88%.
        args:
          - "--cov=webcam_aggregator"
          - "--cov-report=term-missing"
          - "--cov-fail-under=85"

      - id: vulture
        name: vulture (dead code)
        entry: vulture
        language: python
        additional_dependencies: ["vulture==2.16"]
        pass_filenames: false
        files: '^src/'
        # confidence 60 catches dead functions/attributes/fields (not just imports,
        # which flake8/basedpyright already get). Framework-dispatched methods are
        # false positives, ignored by name: do_GET/log_message (HTTP handler) and
        # get_connection_with_tls_context (a requests HTTPAdapter override, called
        # by requests, not by us).
        args:
          - "src/webcam_aggregator/"
          - "--min-confidence"
          - "60"
          - "--ignore-names"
          - "do_GET,log_message,get_connection_with_tls_context"

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/DetachHead/basedpyright-pre-commit-mirror
    rev: 1.39.8
    hooks:
      - id: basedpyright
        additional_dependencies:
          - google-api-python-client-stubs==1.37.0
          - types-psutil==7.2.2.20260518
          - types-requests==2.33.0.20260518
          - pytest==9.1.1  # so basedpyright can resolve pytest types in tests/
